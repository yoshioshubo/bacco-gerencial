<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Gerencial — Criar senha</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f2;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .logo{text-align:center;margin-bottom:2rem}
  .logo h1{font-size:20px;font-weight:500;color:#1a1a18}
  .logo p{font-size:13px;color:#6b6b67;margin-top:6px;line-height:1.5}
  .field{margin-bottom:1rem}
  label{display:block;font-size:12px;color:#6b6b67;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
  input:focus{border-color:#1D9E75}
  .btn{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:.5rem}
  .btn:hover{background:#188c66}
  .erro{background:#FCEBEB;border:1px solid #F7C1C1;border-radius:8px;padding:.65rem 1rem;font-size:13px;color:#A32D2D;margin-bottom:1rem;display:none}
  .hint{font-size:11px;color:#a0a09c;margin-top:4px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Crie sua senha</h1>
    <p>Primeiro acesso detectado.<br>Defina uma senha pessoal para continuar.</p>
  </div>
  <div class="erro" id="erroMsg"></div>
  <form method="POST" action="/trocar-senha">
    <div class="field">
      <label>Nova senha</label>
      <input type="password" name="nova" autocomplete="new-password" required autofocus minlength="6">
      <div class="hint">Mínimo 6 caracteres</div>
    </div>
    <div class="field">
      <label>Confirme a senha</label>
      <input type="password" name="confirma" autocomplete="new-password" required>
    </div>
    <button class="btn" type="submit">Salvar e entrar</button>
  </form>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const msgs = { curta: 'A senha deve ter pelo menos 6 caracteres.', naoconfere: 'As senhas não conferem.' };
  const e = p.get('erro');
  if(e && msgs[e]){ const el=document.getElementById('erroMsg'); el.textContent=msgs[e]; el.style.display='block'; }
</script>
</body>
</html>
