<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Gerencial — Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f2;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .logo{text-align:center;margin-bottom:2rem}
  .logo h1{font-size:22px;font-weight:500;color:#1a1a18}
  .logo p{font-size:13px;color:#6b6b67;margin-top:4px}
  .field{margin-bottom:1rem}
  label{display:block;font-size:12px;color:#6b6b67;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
  input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
  input:focus{border-color:#1D9E75}
  .btn{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:.5rem}
  .btn:hover{background:#188c66}
  .erro{background:#FCEBEB;border:1px solid #F7C1C1;border-radius:8px;padding:.65rem 1rem;font-size:13px;color:#A32D2D;margin-bottom:1rem;display:none}
  .footer{text-align:center;font-size:11px;color:#a0a09c;margin-top:1.5rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>Relatório Gerencial</h1>
    <p>Victory Business · Bacco</p>
  </div>
  <div class="erro" id="erroMsg">Usuário ou senha incorretos.</div>
  <form method="POST" action="/login">
    <div class="field">
      <label>Usuário</label>
      <input type="text" name="usuario" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" name="senha" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Entrar</button>
  </form>
  <div class="footer">Victory Business Hotel · Juiz de Fora</div>
</div>
<script>
  if(location.search.includes('erro=1')) document.getElementById('erroMsg').style.display='block';
</script>
</body>
</html>
